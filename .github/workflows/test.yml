name: test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        pytest-version: ["~=7.2", "~=8.3", "~=9.0"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install -U pip setuptools wheel
        pip install -e .
        # Force correct `pytest` version for different envs:
        pip install -U "pytest${{ matrix.pytest-version }}"
    - name: Run tests
      run: pytest

  test-mypy-compat:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        mypy-version:
          - "~=1.3.0" # Lowest supported mypy version
          - "~=1.19.1"
          - "~=2.0.0"

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        # 3.11 is the highest Python supported by the lowest mypy in the matrix.
        python-version: "3.11"
    - name: Install dependencies
      run: |
        pip install -U pip setuptools wheel
        pip install -e .
        pip install -U "mypy${{ matrix.mypy-version }}"
    - name: Run cache-cleanup tests
      run: pytest pytest_mypy_plugins/tests/test_mypy_cache.py

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    - name: Install dependencies
      run: |
        pip install -U pip setuptools wheel
        pip install -r requirements.txt
    - name: Run linters
      run: |
        mypy .
        black --check .
        isort --check --diff .
